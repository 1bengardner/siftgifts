<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Travel Fund</title>

<style>
body {
  font-family: Arial;
  text-align: center;
}

#jar-wrapper {
  width: 300px;
  height: 420px;
  margin: 20px auto;
  position: relative;
}

#paper-layer {
  position: absolute;
  top: 0;
  left: 0;
}

input {
  margin: 5px;
  padding: 5px;
}
</style>

</head>
<body>

<h2>Travel Fund</h2>

<div id="jar-wrapper">

  <!-- Jar SVG -->
  <svg width="300" height="420" viewBox="0 0 300 420">

    <!-- Clip path -->
    <defs>
      <clipPath id="jar-clip">
      <path d="
        M85 110
        Q85 85 115 85
        L185 85
        Q215 85 215 110
        L250 260
        Q250 340 170 360
        L130 360
        Q50 340 50 260
        Z
      "/>
      </clipPath>
    </defs>

    <!-- Body -->
    <path d="
      M85 110
      Q85 85 115 85
      L185 85
      Q215 85 215 110

      L250 260
      Q250 340 170 360
      L130 360
      Q50 340 50 260

      Z
    "
    fill="rgba(180,210,255,0.35)"
    stroke="#d9e6fa"
    stroke-width="4"/>

    <!-- Neck -->
    <rect x="115" y="50" width="70" height="35" rx="12"
        fill="rgba(180,210,255,0.35)"
        stroke="#d9e6fa"
        stroke-width="4"/>

    <!-- Opening -->
    <ellipse cx="150" cy="50" rx="45" ry="12"
         fill="rgba(200,220,255,0.6)"
         stroke="#d9e6fa"
         stroke-width="4"/>

    <!-- Highlight -->
    <path d="
      M110 100
      Q120 90 130 100
      L130 300
      Q125 320 115 300
      Z"
    fill="rgba(255,255,255,0.25)"/>

  </svg>

  <!-- Papers -->
  <svg id="paper-layer" width="300" height="420"
     style="clip-path: url(#jar-clip);"></svg>

</div>

<div id="total">Total: $0.00</div>

<div>
  <input id="source" placeholder="Source">
  <input id="amount" type="number" step="0.01" placeholder="Amount">
  <button id="submit">Add</button>
</div>

<script src="travel-fund.js"></script>

</body>
</html>
