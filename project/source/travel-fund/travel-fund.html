<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Travel Fund</title>
<style>
  #jar-container { width: 300px; height: 400px; border: 2px solid #333; margin: 20px auto; position: relative; overflow: hidden; background: #f0f0f0; border-radius: 20px 20px 10px 10px;}
  .paper { position: absolute; padding: 2px 5px; background: white; border: 1px solid #aaa; border-radius: 3px; font-size: 12px; }
  #form-container { text-align: center; margin-top: 20px; }
</style>
</head>
<body>

<h2 style="text-align:center;">Travel Fund</h2>

<div id="jar-container"></div>

<div id="total" style="text-align:center; font-weight:bold; margin-top:10px;">Total: $0.00</div>

<div id="form-container">
  <input type="text" id="source" placeholder="Contribution source">
  <input type="number" id="amount" step="0.01" placeholder="Amount">
  <button id="submit">Add Contribution</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script src="travel-fund.js"></script>

</body>
</html>
